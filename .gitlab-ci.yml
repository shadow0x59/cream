image: node

stages:
    - build
    - test
    - deploy # deployment is enabled only for pages

cache:
    - &global_cache_node_modules
      key:
          files:
              - package-lock.json
      paths:
          - node_modules/
      policy: pull

install-dependencies:
    stage: .pre
    cache:
        # Mimic &global_cache_node_modules config but override policy
        # to allow this job to update the cache at the end of the job
        # and only update if it was a successful job (#5)
        - <<: *global_cache_node_modules
          when: on_success
          policy: pull-push
        - key:
              ${CI_JOB_NAME}
              # must be inside $CI_PROJECT_DIR for gitlab-runner caching (#3)
          paths:
              - .npm/
          when: on_success
          policy: pull-push
    script:
        - npm ci --cache .npm --prefer-offline

build: # This job runs in the build stage, which runs first.
    stage: build
    environment: production
    artifacts:
        untracked: false
        when: on_success
        access: all
        expire_in: 30 days
        paths:
            - dist/
    script:
        - npm run build

unit-test-job: # This job runs in the test stage.
    stage: test # It only starts when the job in the build stage completes successfully.
    script:
        - npm test -- --coverage --ci --reporters=default --reporters=jest-junit
    coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
    artifacts:
        untracked: false
        when: on_success
        access: all
        expire_in: 30 days
        paths:
            - coverage/
        reports:
            coverage_report:
                coverage_format: cobertura
                path: coverage/cobertura-coverage.xml
            junit:
                - junit.xml

lint-test-job: # This job also runs in the test stage.
    stage: test # It can run at the same time as unit-test-job (in parallel).
    script:
        - npx prettier . --check

pages-test:
    stage: test
    script:
        - npx typedoc src/index.ts --out test-pages
    artifacts:
        when: on_success
        access: all
        expire_in: 30 days
        paths:
            - test-pages
    rules:
        - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH # this job will be executed only on seconday branches

pages:
    stage: deploy
    script:
        - npx typedoc src/index.ts --out public
    artifacts:
        paths:
            - public
        when: on_success
    rules:
        - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH # This job is executed only on the main branch

